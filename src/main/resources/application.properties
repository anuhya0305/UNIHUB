# 1. Server Configuration
server.port=8080

# 2. Database Connection Settings
# JDBC string: connects via localhost on port 3306 to the unihub_db schema
spring.datasource.url=jdbc:mysql://localhost:3306/unihub_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Srilalitha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Hibernate / JPA Engine Configuration
# 'update' means Hibernate will safely inspect your Java entities and automatically create or update your SQL tables
spring.jpa.hibernate.ddl-auto=update
# Shows the exact SQL queries running behind the scenes inside your terminal console
spring.jpa.show-sql=true
# Formats the terminal SQL statements so they are clean and human-readable
spring.jpa.properties.hibernate.format_sql=true
# Specifies that we are explicitly mapping to a MySQL engine variant
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect