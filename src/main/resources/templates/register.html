<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - UNIHUB</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2>Create Account</h2>
        <p>Join the UNIHUB community</p>
        <form th:action="@{/register}" th:object="${user}" method="post">

            <input type="text"
                   th:field="*{fullName}"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   th:field="*{email}"
                   placeholder="Email"
                   required>

            <input type="password"
                   th:field="*{password}"
                   placeholder="Password"
                   required>

            <button type="submit">
                Register
            </button>

        </form>
        <p>
            Already have an account?
            <a th:href="@{/login}">
                Login
            </a>
        </p>
    </div>
</div>
</body>
</html>
