<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Resources</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="dashboard">

    <div class="sidebar">

        <h2>UNIHUB</h2>

        <ul>

            <li><a th:href="@{/dashboard}">🏠 Dashboard</a></li>

            <li><a th:href="@{/resources}">📚 Resources</a></li>

            <li><a href="#">🤝 Skill Exchange</a></li>

            <li><a href="#">📅 Events</a></li>

            <li><a href="#">📢 Announcements</a></li>

            <li><a href="#">👤 Profile</a></li>

            <li><a th:href="@{/}">🚪 Logout</a></li>

        </ul>

    </div>

    <div class="content">

        <h1>Study Resources</h1>

        <a th:href="@{/resources/add}">
            ➕ Add New Resource
        </a>

        <br><br>

        <table border="1" cellpadding="10">

            <tr>

                <th>Title</th>
                <th>Subject</th>
                <th>Description</th>
                <th>Actions</th>

            </tr>

            <tr th:each="resource : ${resources}">

                <td th:text="${resource.title}"></td>
                <td th:text="${resource.subject}"></td>
                <td th:text="${resource.description}"></td>
                <td>
                    <a th:href="@{/resources/edit/{id}(id=${resource.id})}">
                        ✏ Edit
                    </a>
                    |
                    <a th:href="@{/resources/delete/{id}(id=${resource.id})}"
                       onclick="return confirm('Are you sure you want to delete this resource?')">
                        🗑 Delete
                    </a>
                </td>
            </tr>

        </table>

    </div>

</div>

</body>

</html>
